<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kristian Indrajati Herlambang · Neon</title>
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    /* Kartu utama — latar hitam pekat dengan aksen neon */
    .card {
      max-width: 820px;
      width: 100%;
      background: #0f0f0f;
      background-image: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #070707 90%);
      padding: 3rem 2.5rem;
      border-radius: 3rem;
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(255, 255, 255, 0.03),
        inset 0 2px 0 rgba(255, 255, 255, 0.02);
      text-align: center;
      transition: box-shadow 0.2s ease;
      border: 1px solid #222;
    }

    /* Elemen neon utama — nama */
    .neon-name {
      font-size: clamp(2.8rem, 12vw, 4.8rem);
      font-weight: 700;
      letter-spacing: 2px;
      color: #d0f0ff;
      text-shadow: 
        0 0 7px #00ccff,
        0 0 15px #00a6ff,
        0 0 30px #0077ff,
        0 0 60px #0044ff,
        0 0 100px #0022aa;
      margin-bottom: 0.3rem;
      line-height: 1.2;
      word-break: break-word;
      transition: text-shadow 0.25s ease;
    }

    /* efek neon berdenyut halus */
    .neon-name:hover {
      text-shadow: 
        0 0 10px #66eaff,
        0 0 25px #33ccff,
        0 0 50px #0099ff,
        0 0 80px #0055ff,
        0 0 120px #0033cc;
    }

    /* subjudul / profesi — neon berbeda (hijau kebiruan) */
    .neon-profesi {
      font-size: clamp(1.6rem, 6vw, 2.6rem);
      font-weight: 500;
      letter-spacing: 2px;
      color: #b8ffe0;
      text-shadow: 
        0 0 6px #00ffb3,
        0 0 15px #00dd99,
        0 0 30px #00aa77,
        0 0 55px #007755,
        0 0 90px #004433;
      margin-top: 0.2rem;
      margin-bottom: 0.75rem;
      word-break: break-word;
      transition: text-shadow 0.2s ease;
    }

    .neon-profesi:hover {
      text-shadow: 
        0 0 10px #66ffcc,
        0 0 25px #33ffbb,
        0 0 50px #00dd99,
        0 0 80px #009966,
        0 0 120px #006644;
    }

    /* garis dekoratif neon */
    .divider {
      width: 110px;
      height: 3px;
      margin: 1.2rem auto 1.5rem;
      background: linear-gradient(90deg, transparent, #00ccff, #00ffb3, transparent);
      border-radius: 10px;
      box-shadow: 0 0 20px #00a6ff, 0 0 40px #0077ff;
      opacity: 0.7;
    }

    /* informasi tambahan / sekunder (seperti label) */
    .info-neon {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      background: rgba(20, 30, 40, 0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 200, 255, 0.25);
      box-shadow: 0 0 15px rgba(0, 150, 255, 0.2);
      color: #a0d0ff;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .info-neon span {
      color: #b8ffe0;
      font-weight: 400;
      text-shadow: 0 0 8px #00ffb3;
    }

    .info-neon:hover {
      background: rgba(0, 40, 60, 0.6);
      border-color: #33ddff;
      box-shadow: 0 0 25px #0088ff, 0 0 45px #0066cc;
      color: #d4f0ff;
    }

    /* teks kecil "GURU" dengan efek neon pink/ungu */
    .badge-guru {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.8rem;
      background: rgba(30, 0, 40, 0.3);
      border-radius: 40px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 100, 200, 0.2);
      color: #ffb3e6;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-shadow: 0 0 15px #ff44aa, 0 0 35px #cc0088;
      box-shadow: 0 0 20px rgba(255, 0, 150, 0.15);
      transition: 0.2s;
    }

    .badge-guru:hover {
      border-color: #ff66bb;
      box-shadow: 0 0 30px #ff44aa, 0 0 60px #cc0088;
      background: rgba(50, 0, 60, 0.3);
    }

    /* footer / quote kecil dengan neon lembut */
    .quote-neon {
      margin-top: 2.2rem;
      font-size: 0.9rem;
      color: #7a8b9b;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 1.8rem;
      text-shadow: 0 0 5px #004466;
    }

    .quote-neon i {
      font-style: normal;
      color: #99ccff;
      text-shadow: 0 0 12px #0099ff, 0 0 25px #0066aa;
      letter-spacing: 5px;
    }

    /* efek glitch / distorsi halus pada nama (opsional) */
    @keyframes flicker {
      0% { opacity: 0.98; text-shadow: 0 0 8px #00ccff, 0 0 20px #0077ff, 0 0 40px #0044ff; }
      50% { opacity: 1; text-shadow: 0 0 12px #66eeff, 0 0 30px #00aaff, 0 0 60px #0055ff, 0 0 100px #0033aa; }
      100% { opacity: 0.98; text-shadow: 0 0 8px #00ccff, 0 0 20px #0077ff, 0 0 40px #0044ff; }
    }

    .neon-name {
      animation: flicker 3s infinite alternate ease-in-out;
    }

    /* responsif */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      .info-neon {
        font-size: 0.9rem;
        padding: 0.4rem 1.2rem;
      }
      .badge-guru {
        font-size: 0.9rem;
        padding: 0.3rem 1.2rem;
      }
    }

    /* sentuhan aksen titik-titik neon di background (purely decorative) */
    .card::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
      background: radial-gradient(circle at 30% 40%, rgba(0, 255, 200, 0.02) 0%, transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.02) 0%, transparent 50%);
      border-radius: 3rem;
      pointer-events: none;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 2;
    }

    /* sapuan neon tambahan */
    .glow-ring {
      position: absolute;
      inset: -8px;
      border-radius: 3.2rem;
      padding: 2px;
      background: conic-gradient(from 0deg, transparent, #00ccff20, transparent, #00ffb320, transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.3;
    }

    .card {
      position: relative;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 3rem;
      background: linear-gradient(135deg, #00ccff10, transparent 50%, #00ffb310);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- dekorasi ring (hanya visual) -->
    <div class="glow-ring"></div>

    <!-- NAMA UTAMA (NEON BIRU) -->
    <h1 class="neon-name">Kristian Indrajati Herlambang</h1>

    <!-- PROFESI (NEON HIJAU / TEAL) -->
    <div class="neon-profesi">Guru SMA Katolik St. Albertus (Dempo) Malang</div>

    <!-- garis neon -->
    <div class="divider"></div>

    <!-- info tambahan (gaya neon soft) -->
    <div class="info-neon">
      <span>✧</span> pendidik · penggerak <span>✧</span>
    </div>

    <!-- badge GURU dengan nuansa pink/ungu neon -->
    <div class="badge-guru">✦ G U R U ✦</div>

    <!-- kutipan atau motto kecil (neon lembut) -->
    <div class="quote-neon">
      <i>“ mencerdaskan & menumbuhkan ”</i>
    </div>

    <!-- sentuhan ekstra: teks kecil "SMAK St. Albertus" dalam neon redup -->
    <div style="margin-top: 1rem; font-size: 0.8rem; letter-spacing: 3px; color: #3a5a6a; text-shadow: 0 0 8px #003344;">
      <span style="color: #5f8a9f; text-shadow: 0 0 10px #006688;">⚡</span> 
      SMA Katolik St. Albertus (Dempo) Malang 
      <span style="color: #5f8a9f; text-shadow: 0 0 10px #006688;">⚡</span>
    </div>
  </div>
</body>
</html>
